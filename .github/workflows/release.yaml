name: Release
on:
  push:
    tags:
      - '*.*.*'
      - 'v*.*.*'
      - '*.*.*-*'
      - 'v*.*.*-*'
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm
      fail-fast: false
    env:
      ARCH: ${{ matrix.os == 'ubuntu-24.04' && 'x86_64' || (matrix.os == 'ubuntu-24.04-arm' && 'aarch64') || 'unknown' }}
    steps:
      - name: Install qemu-utils
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-utils
      - name: Generate github token
        id: generate_token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.generate_token.outputs.token }}
      - uses: cachix/install-nix-action@1ca7d21a94afc7c957383a2d217460d980de4934 # v31
        with:
          github_access_token: ${{ steps.generate_token.outputs.token }}
          nix_path: nixpkgs=channel:nixos-unstable
          install_options: --no-daemon
          extra_nix_config: |
            system-features = ${{ env.ARCH == 'aarch64' && 'kvm aarch64-linux' || 'kvm' }}
      - name: Build ${{ env.ARCH }} image
        run: |
          nix build .#packages.${{ env.ARCH }}-linux.lima-img --out-link result-${{ env.ARCH }}
          qemu-img convert -O qcow2 -c result-${{ env.ARCH }}/nixos.qcow2 nixos-lima-${{ env.ARCH }}.qcow2
      - name: Upload image
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          path: nixos-lima-${{ env.ARCH }}.qcow2
          archive: false
  release:
    runs-on: ubuntu-slim
    needs:
      - build
    steps:
      - name: Generate github token
        id: generate_token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.generate_token.outputs.token }}
      - name: Download image (aarch64)
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: nixos-lima-aarch64.qcow2
      - name: Download image (x86_64)
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: nixos-lima-x86_64.qcow2
      - name: Calculate digests
        run: |
          sha512sum nixos-lima-aarch64.qcow2 > nixos-lima-aarch64.qcow2.sha512
          sha512sum nixos-lima-x86_64.qcow2 > nixos-lima-x86_64.qcow2.sha512
      - name: Create release
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          gh release create \
            ${{ github.ref_name }} \
            nixos-lima-aarch64.qcow2 \
            nixos-lima-x86_64.qcow2 \
            nixos-lima-aarch64.qcow2.sha512 \
            nixos-lima-x86_64.qcow2.sha512 \
            --title ${{ github.ref_name }}
