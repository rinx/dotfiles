[user]
name = "Rintaro Okamura"
email = "rintaro.okamura@gmail.com"

[colors]
wip = "yellow"
todo = "blue"
mega = "red"
private = "green"

[ui]
default-command = ["log", "-T", "log_compact"]
editor = "nvim"
diff-editor = "gitpatch"
paginate = "never"
show-cryptographic-signatures = true

# Ref: https://zerowidth.com/2025/jj-tips-and-tricks/#hunk-wise-style
[merge-tools.gitpatch]
program = "sh"
edit-args = [
  "-c",
  '''
  set -eu
  rm -f "$right/JJ-INSTRUCTIONS"
  git -C "$left" init -q
  git -C "$left" add -A
  git -C "$left" commit -q -m baseline --allow-empty
  mv "$left/.git" "$right"
  git -C "$right" add --intent-to-add --ignore-removal .
  git -C "$right" add -p
  git -C "$right" diff-index --quiet --cached HEAD && { echo "No changes done, aborting split."; exit 1; }
  git -C "$right" commit -q -m split
  git -C "$right" reset -q --hard
''',
]

[signing]
behavior = "own"
backend = "gpg"

[aliases]
pre-commit = ['util', 'exec', '--', 'pre-commit', 'run', '--all-files']
pr = [
  'util',
  'exec',
  '--',
  'bash',
  '-c',
  '''
gh pr create --draft --head $(jj log -r 'closest_bookmark(@)' -T 'surround("", " ", bookmarks)' --no-graph --ignore-working-copy | cut -d ' ' -f 1)
''',
]

tug = [
  "bookmark",
  "move",
  "--from",
  "heads(::@ & bookmarks())",
  "--to",
  "closest_pushable(@)",
]

[templates]
commit_trailers = '''
format_signed_off_by_trailer(self)
'''

git_push_bookmark = '''
separate('-', reference_issue('Refs'), slugify(description), change_id.shortest(8))
'''

# Ref: https://andre.arko.net/2025/09/28/stupid-jj-tricks/
draft_commit_description = '''
  concat(
    coalesce(description, default_commit_description, "\n"),
    surround(
      "\nJJ: This commit contains the following changes:\n", "",
      indent("JJ:     ", diff.stat(72)),
    ),
    "\nJJ: ignore-rest\n",
    diff.git(),
  )
'''

revert_description = '''
concat(
  "revert: " ++ description.first_line() ++ "\n",
  "\n",
  "Revert-of: " ++ commit_id,
)
'''

[template-aliases]

# based on builtin_log_compact
log_compact = 'log_compact(self)'
'log_compact(commit)' = '''
if(commit.root(),
  format_root_commit(commit),
  label(
    separate(" ",
      if(commit.current_working_copy(), "working_copy"),
      if(commit.immutable(), "immutable", "mutable"),
      if(commit.conflict(), "conflicted"),
    ),
    concat(
      format_short_commit_header(commit) ++ "\n",
      separate(" ",
        if(commit.empty(), empty_commit_marker),
        if(commit.description().starts_with("wip"), label("wip", " ")),
        if(commit.description().starts_with("todo"), label("todo", " ")),
        if(commit.description().starts_with("mega"), label("mega", " ")),
        if(commit.description().starts_with("private"), label("private", "󰈉 ")),
        if(commit.description(),
          commit.description().first_line(),
          label(if(commit.empty(), "empty"), description_placeholder),
        ),
      ) ++ "\n",
    ),
  )
)
'''

# for zsh prompt
# Ref: https://zerowidth.com/2025/async-zsh-jujutsu-prompt-with-p10k/
prompt = '''
separate(" ",
  format_short_change_id_with_change_offset(self),
  commit_id.shortest(8),
  if(empty, label("empty", "(empty)"), ""),
  if(description == "", label("description placeholder", "(no description)"), ""),
  if(description.starts_with("wip"), label("wip", "(wip)"), ""),
  if(description.starts_with("todo"), label("todo", "(todo)"), ""),
  if(description.starts_with("mega"), label("mega", "(mega)"), ""),
  if(description.starts_with("private"), label("private", "(private)"), ""),
  if(conflict, label("conflict", "(conflict)"), "")
)
'''

# for git_push_bookmark
# Ref: https://ddbeck.com/notes/jj-git-push-bookmark-template/
# Ref: https://lobste.rs/s/r4xf2n/better_generated_branch_names_with_jj
'reference_issue(key)' = '''
  truncate_end(
    16,
    stringify(
      if(trailers.any(|t| t.key() == key && t.value().match(regex:'^[^/]+/[a-zA-Z0-9._-]{1,100}#[0-9]+$')),
          trailers.filter(|t| t.key() == key && t.value().match(regex:'^[^/]+/[a-zA-Z0-9._-]{1,100}#[0-9]+$'))
          .first().value()
          .replace(regex:'^[^/]+/', '')
          .replace(regex:'[^[[:alnum:]].]', '-')
          .replace(regex:'-{2,}', '-')
          .replace(regex:'\.{2,}', '.')
          .replace(regex:'(^-+|-+$)', '')
          .lower(),
          '')))
'''
'slugify(str)' = '''
  truncate_end(
    40,
    str.first_line()
      .replace(regex:'^[^:]+:', '')
      .replace(regex:'[^[[:alnum:]].]', '-')
      .replace(regex:'-{2,}', '-')
      .replace(regex:'\.{2,}', '.')
      .replace(regex:'(^-+|-+$)', '')
      .lower())
'''

# Ref: https://isaaccorbrey.com/notes/jujutsu-megamerges-for-fun-and-profit
[revset-aliases]
'wip()' = 'description(glob:"wip*")'
'todo()' = 'description(glob:"todo*")'
'private()' = 'description(glob:"private*")'

'closest_bookmark(to)' = 'heads(::to & bookmarks())'
'closest_merge(to)' = 'heads(::to & merges())'
'closest_pushable(to)' = 'heads(::to & mutable() & ~description(exact:"") & (~empty() | merges()))'

# Ref: https://github.com/jj-vcs/jj/discussions/4690#discussioncomment-16870293
# allow for `jj diff` and `jj show` to clear output from terminal after pager closed
[[--scope]]
--when.commands = ["diff", "show"]

[--scope.ui]
# stop using delta as the pager for already-delta-formatted output
pager = ["less", "-FR"] # seems to be default (?)
# keep delta as external diff formatter to diffs real temp files/dir and keep syntax highlighting
diff-formatter = "delta"

# pass jj's computed terminal width via $width
[merge-tools.delta]
diff-args = ["--width=$width", "$left", "$right"]
diff-expected-exit-codes = [0, 1]
