  # Refs: https://isaaccorbrey.com/notes/jujutsu-megamerges-for-fun-and-profit
  - name: jj stack
    keyword: stack
    snippet: rebase --after 'trunk()' --before 'closest_merge(@)' --revision
    context:
      lbuffer: '^jj\s+'
  - name: jj stage
    keyword: stage
    snippet: "rebase --after 'trunk()' --before 'closest_merge(@)' --revision 'closest_merge(@)+:: ~ empty()'"
    context:
      lbuffer: '^jj\s+'
  - name: jj restack
    keyword: restack
    snippet: rebase --onto 'trunk()' --source 'roots(trunk()..) & mutable()' --simplify-parents
    context:
      lbuffer: '^jj\s+'
