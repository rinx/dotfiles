# Template using nixos-lima
# ref: https://github.com/nixos-lima/nixos-lima
images:
  - location: "https://github.com/rinx/dotfiles/releases/download/2026.05.23/nixos-lima-aarch64.qcow2"
    arch: "aarch64"
    digest: "sha512:5e03cc5aac1bbea8ddf1ce729b9ad9247347dae7c97e125ab53f1c0c670a8d1d322f3cb6161fc0f10f30346f32650dd3ca8fcb74fe4118bdcbdc36731aa22a32"
  - location: "https://github.com/rinx/dotfiles/releases/download/2026.05.23/nixos-lima-x86_64.qcow2"
    arch: "x86_64"
    digest: "sha512:9cd8b69f02f6c56da6338b20654e04484c128f67acf541f4b2eab92d195de4e614642190a99cbd0e73e11fbd229dbe5d5e6cc940e5a9d15bdef85d521d5d4318"
cpus: 2
memory: 4GiB
portForwards:
  # Tell Lima's port-forwarding to ignore port 68 to prevent interception of host DHCP packets
  # Apparently this is an issue with NixOS that does not occur on other Linux distros
  # See: https://github.com/nixos-lima/nixos-lima/issues/50
  - proto: udp
    guestPort: 68
    guestIP: 0.0.0.0
    ignore: true
containerd:
  system: false
  user: false
ssh:
  forwardAgent: false
user:
  name: rinx
  shell: /run/current-system/sw/bin/zsh
vmType: vz
message: |
  To initialize the VM environment, execute `nixos-rebuild switch` and `home-manager switch`.

      limactl shell {{.Name}} -- nixos-rebuild switch --flake github:rinx/dotfiles#sandbox-vm --sudo
      limactl shell {{.Name}} -- nix run nixpkgs#home-manager -- --flake github:rinx/dotfiles#lima switch

  Restart the VM after initializing.

      limactl restart {{.Name}}

  To install neovim plugins, run the following command.

      limactl shell {{.Name}} -- nvim --headless -c 'Lazy! restore' -c 'qall'

  Login to the VM.

      limactl shell {{.Name}} -- zsh

  Or use syncing working directory feature.

      limactl shell --sync . {{.Name}} zsh
