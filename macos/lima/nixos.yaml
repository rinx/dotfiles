# Template using nixos-lima
# ref: https://github.com/nixos-lima/nixos-lima
images:
  - location: "https://github.com/rinx/dotfiles/releases/download/2026.03.03-3/nixos-lima-aarch64.qcow2"
    arch: "aarch64"
    digest: "sha512:39ceb045bfc8163734542d30e96a7193470fecaa769486cb2598e7cde2517bc9c03fa03c57a5b52235c28a74995d141eb5b85c2da0c8ae9608ea962ec7e2b3fe"
  - location: "https://github.com/rinx/dotfiles/releases/download/2026.03.03-3/nixos-lima-x86_64.qcow2"
    arch: "x86_64"
    digest: "sha512:d92f7c02ade4abbc58810690acfe462468c304908214085fecf575201c57677905ecef3dc2145dace8a43c9dd0a79a1adcdd629a70a69860b7666fdf3c7ff3e1"
mounts:
  - location: "~"
    writable: false
    9p:
      # Try choosing "mmap" or "none" if you see a stability issue with the default "fscache".
      cache: "mmap"
  - location: "/tmp/lima"
    writable: true
    9p:
      cache: "mmap"
  - location: "~/.dotfiles"
    writable: true
    9p:
      cache: "mmap"
  - location: "~/local"
    mountPoint: "{{.Home}}/local"
    writable: true
    9p:
      cache: "mmap"
  - location: "~/notes"
    mountPoint: "{{.Home}}/notes"
    writable: true
    9p:
      cache: "mmap"
  - location: "~/.dotfiles.local"
    mountPoint: "{{.Home}}/.dotfiles.local"
    writable: true
    9p:
      cache: "mmap"
cpus: 4
memory: 8GiB
portForwards:
  # Tell Lima's port-forwarding to ignore port 68 to prevent interception of host DHCP packets
  # Apparently this is an issue with NixOS that does not occur on other Linux distros
  # See: https://github.com/nixos-lima/nixos-lima/issues/50
  - proto: udp
    guestPort: 68
    guestIP: 0.0.0.0
    ignore: true
  # gpg-agent forwarding
  - hostSocket: "{{.Home}}/.gnupg/S.gpg-agent.extra"
    guestSocket: "{{.Home}}/.S.gpg-agent.host"
    reverse: true
  # docker
  - hostSocket: "{{.Dir}}/sock/docker.sock"
    guestSocket: "/var/run/docker.sock"
containerd:
  system: false
  user: false
ssh:
  forwardAgent: true
user:
  name: rinx
  shell: /run/current-system/sw/bin/zsh
message: |
  To initialize the VM environment, execute `home-manager switch`.

      limactl shell nixos -- nix run nixpkgs#home-manager -- --flake github:rinx/dotfiles#lima switch

  Login to the VM.

      limactl shell nixos -- zsh
      ## or, export host environment variables like
      # limactl shell nixos -- GH_TOKEN=$(gh auth token) zsh

  Fix `gpg-agent` socket.

      echo "%Assuan%\nsocket=${HOME}/.S.gpg-agent.host" > $(gpgconf --list-dir agent-socket)

  After that, import GPG pubkey and ownertrust.

      gpg --export --armor 54CEC37D516CF1E59A560DEA2E26B9B26A1D5D29 | limactl shell nixos -- gpg --import
      gpg --export-ownertrust | limactl shell nixos -- gpg --import-ownertrust

  ---

  To use `docker` on the host, run the follwing commands.

      docker context create lima-{{.Name}} --docker "host=unix://{{.Dir}}/sock/docker.sock"
      docker context use lima-{{.Name}}
