# Template using nixos-lima
# ref: https://github.com/nixos-lima/nixos-lima
images:
  - location: "https://github.com/rinx/dotfiles/releases/download/2026.03.03-3/nixos-lima-aarch64.qcow2"
    arch: "aarch64"
    digest: "sha512:39ceb045bfc8163734542d30e96a7193470fecaa769486cb2598e7cde2517bc9c03fa03c57a5b52235c28a74995d141eb5b85c2da0c8ae9608ea962ec7e2b3fe"
  - location: "https://github.com/rinx/dotfiles/releases/download/2026.03.03-3/nixos-lima-x86_64.qcow2"
    arch: "x86_64"
    digest: "sha512:d92f7c02ade4abbc58810690acfe462468c304908214085fecf575201c57677905ecef3dc2145dace8a43c9dd0a79a1adcdd629a70a69860b7666fdf3c7ff3e1"
mounts:
  - location: "~"
    writable: false
    9p:
      # Try choosing "mmap" or "none" if you see a stability issue with the default "fscache".
      cache: "mmap"
  - location: "/tmp/lima"
    writable: true
    9p:
      cache: "mmap"
  - location: "~/.dotfiles"
    writable: true
    9p:
      cache: "mmap"
  - location: "~/local"
    mountPoint: "{{.Home}}/local"
    writable: true
    9p:
      cache: "mmap"
  - location: "~/notes"
    mountPoint: "{{.Home}}/notes"
    writable: true
    9p:
      cache: "mmap"
  - location: "~/.dotfiles.local"
    mountPoint: "{{.Home}}/.dotfiles.local"
    writable: true
    9p:
      cache: "mmap"
cpus: 4
memory: 8GiB
portForwards:
  # Tell Lima's port-forwarding to ignore port 68 to prevent interception of host DHCP packets
  # Apparently this is an issue with NixOS that does not occur on other Linux distros
  # See: https://github.com/nixos-lima/nixos-lima/issues/50
  - proto: udp
    guestPort: 68
    guestIP: 0.0.0.0
    ignore: true
  # gpg-agent forwarding
  - hostSocket: "{{.Home}}/.gnupg/S.gpg-agent.extra"
    guestSocket: "{{.Home}}/.S.gpg-agent.host"
    reverse: true
containerd:
  system: false
  user: false
ssh:
  forwardAgent: true
