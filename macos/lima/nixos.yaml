# Template using nixos-lima
# ref: https://github.com/nixos-lima/nixos-lima
images:
  - location: "https://github.com/rinx/dotfiles/releases/download/2026.04.14/nixos-lima-aarch64.qcow2"
    arch: "aarch64"
    digest: "sha512:3a1a18695d50e626cadb1284bdba21e17117965a03d0379ac2cc8ff8dcb0fb8c2348eac35673951a341a9be9a069784570c7dc0525e683a71deed17f30ce002c"
  - location: "https://github.com/rinx/dotfiles/releases/download/2026.04.14/nixos-lima-x86_64.qcow2"
    arch: "x86_64"
    digest: "sha512:f64559f7d89282edb496984a909fc5daef4d582e946dbcb2721ba2a9c4b937338b84af7ae9c8f1ed65802b8eaeb3ca393b935e755798f62fb1d6f8dd889f946f"
mounts:
  - location: "~"
    writable: false
    9p:
      # Try choosing "mmap" or "none" if you see a stability issue with the default "fscache".
      cache: "mmap"
  - location: "/tmp/lima"
    writable: true
    9p:
      cache: "mmap"
  - location: "~/local"
    mountPoint: "{{.Home}}/local"
    writable: true
    9p:
      cache: "mmap"
  - location: "~/notes"
    mountPoint: "{{.Home}}/notes"
    writable: true
    9p:
      cache: "mmap"
  - location: "~/.dotfiles.local"
    mountPoint: "{{.Home}}/.dotfiles.local"
    writable: true
    9p:
      cache: "mmap"
cpus: 4
memory: 8GiB
portForwards:
  # Tell Lima's port-forwarding to ignore port 68 to prevent interception of host DHCP packets
  # Apparently this is an issue with NixOS that does not occur on other Linux distros
  # See: https://github.com/nixos-lima/nixos-lima/issues/50
  - proto: udp
    guestPort: 68
    guestIP: 0.0.0.0
    ignore: true
  # gpg-agent forwarding
  - hostSocket: "{{.Home}}/.gnupg/S.gpg-agent.extra"
    guestSocket: "{{.Home}}/.S.gpg-agent.host"
    reverse: true
  # docker
  - hostSocket: "{{.Dir}}/sock/docker.sock"
    guestSocket: "/var/run/docker.sock"
containerd:
  system: false
  user: false
ssh:
  forwardAgent: true
user:
  name: rinx
  shell: /run/current-system/sw/bin/zsh
vmType: vz
vmOpts:
  vz:
    rosetta:
      enabled: true
      binfmt: true
message: |
  To initialize the VM environment, execute `home-manager switch`.

      limactl shell {{.Name}} -- nix run nixpkgs#home-manager -- --flake github:rinx/dotfiles#lima switch

  Import GPG pubkey and ownertrust.

      gpg --export --armor 54CEC37D516CF1E59A560DEA2E26B9B26A1D5D29 | limactl shell {{.Name}} -- gpg --import
      gpg --export-ownertrust | limactl shell {{.Name}} -- gpg --import-ownertrust

  Login to the VM.

      limactl shell {{.Name}} -- zsh
      ## or, export host environment variables like
      # limactl shell {{.Name}} -- GH_TOKEN=$(gh auth token) zsh

  ---

  To use `docker` on the host, run the follwing commands.

      docker context create lima-{{.Name}} --docker "host=unix://{{.Dir}}/sock/docker.sock"
      docker context use lima-{{.Name}}

  ---

  To install extra packages, run the following commands.

      limactl shell {{.Name}} -- nix profile add github:rinx/dotfiles#extra-packages
      limactl shell {{.Name}} -- nix profile add github:rinx/dotfiles#k8s-packages
